<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Kushal Gaddamwar — Agentic AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f2027"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- thin top accent line, animated -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/>
  </rect>

  <!-- corner tag -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#7d8590">
    <text x="60" y="48">~/kushal</text>
    <text x="60" y="68" fill="#58A6FF">$ whoami</text>
  </g>

  <!-- main name -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <text x="60" y="160" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">kushal gaddamwar</text>
    <text x="60" y="200" font-size="22" font-weight="500" fill="#c9d1d9">agentic ai engineer  ·  multi-agent systems  ·  production rag</text>
  </g>

  <!-- subtle tagline -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#7d8590">
    <text x="60" y="248">building the systems around the model  —  not the demos around the prompt</text>
  </g>

  <!-- status pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">
    <g transform="translate(60, 274)">
      <rect width="118" height="26" rx="13" fill="#0d1117" stroke="#2EA043" stroke-width="1"/>
      <circle cx="14" cy="13" r="4" fill="#2EA043">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="26" y="17" fill="#2EA043">open to hire '26</text>
    </g>
    <g transform="translate(186, 274)">
      <rect width="108" height="26" rx="13" fill="#0d1117" stroke="#58A6FF" stroke-width="1"/>
      <text x="14" y="17" fill="#58A6FF">F-1 OPT 2026</text>
    </g>
    <g transform="translate(302, 274)">
      <rect width="86" height="26" rx="13" fill="#0d1117" stroke="#D29922" stroke-width="1"/>
      <text x="14" y="17" fill="#D29922">boston, MA</text>
    </g>
    <g transform="translate(396, 274)">
      <rect width="124" height="26" rx="13" fill="#0d1117" stroke="#7d8590" stroke-width="1"/>
      <text x="14" y="17" fill="#c9d1d9">BU MSCS · dec '26</text>
    </g>
  </g>

  <!-- right-side architectural ascii (decorative) -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#30363d" opacity="0.7">
    <text x="820" y="56">supervisor</text>
    <text x="820" y="76">   |</text>
    <text x="820" y="96">   +-- agent A  (ReAct)</text>
    <text x="820" y="116">   |       |</text>
    <text x="820" y="136">   |       +-- tools</text>
    <text x="820" y="156">   |       +-- memory</text>
    <text x="820" y="176">   |</text>
    <text x="820" y="196">   +-- agent B  (ReAct)</text>
    <text x="820" y="216">           |</text>
    <text x="820" y="236">           +-- tools</text>
    <text x="820" y="256">           +-- memory</text>
  </g>

  <!-- right corner: pulsing cursor -->
  <g transform="translate(1130, 280)">
    <rect x="0" y="-12" width="10" height="16" fill="#58A6FF">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- bottom accent line -->
  <rect x="0" y="318" width="1200" height="2" fill="url(#accent)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
  </rect>
</svg>

name: wakatime weekly stats
on:
  schedule: [{cron: "30 18 * * *"}]
  workflow_dispatch:
permissions: {contents: write}
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TITLE: "true"
          TIME_RANGE: "last_7_days"
          SHOW_TOTAL: "true"
          BLOCKS: "░▒▓█"
